name: Backfill 30-Day History

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Trading days to backfill'
        required: false
        default: '30'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backfill
        env:
          TEMP: /home/runner/work/_temp
          PYTHONIOENCODING: utf-8
        run: python scripts/backfill_history.py

      - name: Push results to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          if [ -f /home/runner/work/_temp/review_history.json ]; then
            cp /home/runner/work/_temp/review_history.json data/review_history.json
          fi
          git config --local user.email "stock-analyzer[bot]@users.noreply.github.com"
          git config --local user.name "Stock Analyzer Bot"
          git add data/ 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "Backfill 30-day history $(date +'%Y-%m-%d %H:%M')"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push
