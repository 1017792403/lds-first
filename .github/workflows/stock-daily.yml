name: Stock Daily Run

on:
  schedule:
    # 北京时间 08:00 = UTC 00:00
    - cron: '0 0 * * *'
    # 北京时间 17:00 = UTC 09:00
    - cron: '0 9 * * *'
  # 允许手动触发
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  run-stock-analyzer:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate stock classification data
        run: python scripts/generate_classification.py

      - name: Run all strategies
        env:
          TEMP: /home/runner/work/_temp
          PYTHONIOENCODING: utf-8
        run: python scripts/gh_run.py

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: stock-results-${{ github.run_id }}
          path: |
            /home/runner/work/_temp/*.json
            /home/runner/work/_temp/stock_reports/
          retention-days: 30

      - name: Save and push results to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          if [ -f /home/runner/work/_temp/review_history.json ]; then
            cp /home/runner/work/_temp/review_history.json data/review_history.json
          fi
          if [ -f /home/runner/work/_temp/result.json ]; then
            cp /home/runner/work/_temp/result.json data/latest_result.json
          fi
          git config --local user.email "stock-analyzer[bot]@users.noreply.github.com"
          git config --local user.name "Stock Analyzer Bot"
          git add data/ 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "Daily stock results $(date +'%Y-%m-%d %H:%M')"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push
